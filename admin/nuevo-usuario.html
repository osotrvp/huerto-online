<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuevo Usuario - HuertoHogar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="admin-body">

  <div class="admin-layout">

    
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <img src="../img/logo.png" alt="Logo HuertoHogar" />
        <span>HuertoHogar</span>
      </div>

      <nav class="admin-menu">
        <ul>
          <li><a href="index.html">📊 Dashboard</a></li>
          <li><a href="productos.html">🥦 Productos</a></li>
          <li><a href="usuarios.html" class="activo">👤 Usuarios</a></li>
          <li><a href="#" onclick="cerrarSesion(); return false;">🚪 Cerrar sesión</a></li>
        </ul>
      </nav>
    </aside>

    
    <div class="admin-contenido">

      <header class="admin-header">
        
        <h1 id="titulo-formulario-usuario">Nuevo Usuario</h1>
        <div class="admin-usuario">
          <span>👋 Hola, Admin</span>
        </div>
      </header>

      <main class="admin-main">

        <section class="admin-form-contenedor">

          <form id="form-usuario-admin">

            
            <input type="hidden" id="usuario-id" name="usuario-id" />

            <div class="form-grilla">

              
              <div class="campo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Nombre" />
                <span class="error" id="error-nombre"></span>
              </div>

              
              <div class="campo">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" placeholder="Apellido" />
                <span class="error" id="error-apellido"></span>
              </div>

              
              <div class="campo">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="correo@ejemplo.cl" />
                <span class="error" id="error-email"></span>
              </div>

              
              <div class="campo">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="+56 9 1234 5678" />
                <span class="error" id="error-telefono"></span>
              </div>

              
              <div class="campo">
                <label for="region">Región</label>
                <select id="region" name="region" onchange="cargarComunasAdmin()">
                  <option value="">-- Selecciona --</option>
                  
                </select>
                <span class="error" id="error-region"></span>
              </div>

              
              <div class="campo">
                <label for="comuna">Comuna</label>
                <select id="comuna" name="comuna">
                  <option value="">-- Primero selecciona región --</option>
                </select>
                <span class="error" id="error-comuna"></span>
              </div>

              
              <div class="campo">
                <label for="rol">Rol</label>
                
                <select id="rol" name="rol">
                  <option value="cliente">Cliente</option>
                  <option value="admin">Administrador</option>
                </select>
                <span class="error" id="error-rol"></span>
              </div>

              
              <div class="campo">
                <label for="estado">Estado</label>
                <select id="estado" name="estado">
                  <option value="activo">Activo</option>
                  <option value="inactivo">Inactivo</option>
                </select>
                <span class="error" id="error-estado"></span>
              </div>

              
              <div class="campo campo-ancho">
                <label for="password">Contraseña</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Dejar en blanco para no cambiarla"
                />
                
                <span class="error" id="error-password"></span>
              </div>

            </div>

            
            <div class="form-acciones">
              <a href="usuarios.html" class="btn-secundario">Cancelar</a>
              <button type="submit" class="btn-principal" id="btn-guardar-usuario">
                Guardar Usuario
              </button>
            </div>

            <p id="mensaje-form-usuario" style="display:none;"></p>

          </form>

        </section>

      </main>

    </div>
  </div>

  <script src="../js/regiones.js"></script>
  <script src="../js/validaciones.js"></script>
  <script src="js/admin-usuarios.js"></script>
  <script src="../js/usuarios-data.js"></script>
  <script src="../js/auth.js"></script>

</body>
</html>
