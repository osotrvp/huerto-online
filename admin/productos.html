<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Productos - HuertoHogar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="admin-body">

  <div class="admin-layout">

    <!-- ===== SIDEBAR ===== -->
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <img src="../img/logo.png" alt="Logo HuertoHogar" />
        <span>HuertoHogar</span>
      </div>

      <nav class="admin-menu">
        <ul>
          <li><a href="index.html">📊 Dashboard</a></li>
          <li><a href="productos.html" class="activo">🥦 Productos</a></li>
          <li><a href="usuarios.html">👤 Usuarios</a></li>
          <li><a href="../index.html">🔙 Volver al sitio</a></li>
        </ul>
      </nav>
    </aside>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <div class="admin-contenido">

      <header class="admin-header">
        <h1>Gestión de Productos</h1>
        <div class="admin-usuario">
          <span>👋 Hola, Admin</span>
        </div>
      </header>

      <main class="admin-main">

        <!-- BARRA DE ACCIONES: BUSCADOR + BOTÓN NUEVO -->
        <section class="admin-toolbar">

          <!-- BUSCADOR -->
          <div class="admin-buscador">
            <input
              type="text"
              id="buscar-producto"
              placeholder="Buscar producto por nombre..."
              onkeyup="filtrarTablaProductos()"
            />
            <!--
              onkeyup en vez de onsubmit: queremos que filtre
              EN TIEMPO REAL mientras el usuario escribe,
              no que espere a un Enter o botón.
            -->
          </div>

          <!-- FILTRO POR CATEGORÍA -->
          <select id="filtro-categoria-admin" onchange="filtrarTablaProductos()">
            <option value="todos">Todas las categorías</option>
            <option value="verduras">Verduras</option>
            <option value="frutas">Frutas</option>
            <option value="hierbas">Hierbas</option>
            <option value="otros">Otros</option>
          </select>

          <!-- BOTÓN NUEVO PRODUCTO -->
          <a href="nuevo-producto.html" class="btn-principal">
            ➕ Nuevo Producto
          </a>

        </section>

        <!-- TABLA DE PRODUCTOS -->
        <section class="admin-tabla-contenedor">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <!--
              El JS recorre el array de productos con un forEach
              y genera una <tr> completa por cada producto,
              incluyendo los botones Editar y Eliminar con el ID
              correspondiente en su onclick.
            -->
            <tbody id="tabla-productos">
              <!-- JS insertará todas las filas aquí -->
            </tbody>
          </table>

          <!-- Mensaje si la búsqueda no encuentra nada -->
          <p id="tabla-vacia" style="display:none;">
            No se encontraron productos.
          </p>
        </section>

      </main>

    </div>
  </div>

  <!--
    MODAL DE CONFIRMACIÓN PARA ELIMINAR
    Está oculto por defecto (display:none en CSS).
    El JS lo muestra antes de borrar, para evitar eliminar por error.
  -->
  <div id="modal-eliminar" class="modal" style="display:none;">
    <div class="modal-contenido">
      <h3>¿Eliminar producto?</h3>
      <p>Esta acción no se puede deshacer.</p>
      <div class="modal-acciones">
        <button onclick="cerrarModal()" class="btn-secundario">Cancelar</button>
        <!--
          confirmarEliminar() sabe qué ID borrar porque el JS
          lo guarda en una variable global al abrir el modal.
        -->
        <button onclick="confirmarEliminar()" class="btn-peligro">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="../js/productos.js"></script>
  <script src="js/admin-productos.js"></script>

</body>
</html>
