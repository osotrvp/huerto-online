<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuevo Producto - HuertoHogar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="../js/usuarios-data.js"></script>
  <script src="../js/auth.js"></script>
</head>

<body class="admin-body">
  <script>protegerVistaAdmin();</script>

  <div class="admin-layout">

    
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <img src="../img/logo.png" alt="Logo HuertoHogar" />
        <span>HuertoHogar</span>
      </div>

      <nav class="admin-menu">
        <ul>
          <li><a href="index.html">📊 Dashboard</a></li>
          <li><a href="productos.html" class="activo">🥦 Productos</a></li>
          <li><a href="usuarios.html">👤 Usuarios</a></li>
          <li><a href="../index.html">🔙 Volver al sitio</a></li>
        </ul>
      </nav>
    </aside>

    
    <div class="admin-contenido">

      <header class="admin-header">
        
        <h1 id="titulo-formulario">Nuevo Producto</h1>
        <div class="admin-usuario">
          <span id="admin-nombre-activo">👋 Hola, Admin</span>
          <button onclick="cerrarSesion()" class="btn-secundario">Cerrar sesión</button>
        </div>
      </header>

      <main class="admin-main">

        <section class="admin-form-contenedor">

          <form id="form-producto">

            -->
            <input type="hidden" id="producto-id" name="producto-id" />

            <div class="form-grilla">

              
              <div class="campo">
                <label for="nombre">Nombre del producto</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Tomate orgánico" />
                <span class="error" id="error-nombre"></span>
              </div>

              
              <div class="campo">
                <label for="categoria">Categoría</label>
                <select id="categoria" name="categoria">
                  <option value="">-- Selecciona --</option>
                  <option value="verduras">Verduras</option>
                  <option value="frutas">Frutas</option>
                  <option value="hierbas">Hierbas</option>
                  <option value="otros">Otros</option>
                </select>
                <span class="error" id="error-categoria"></span>
              </div>

              
              <div class="campo">
                <label for="precio">Precio (CLP)</label>
                
                <input type="number" id="precio" name="precio" placeholder="0" min="0" />
                <span class="error" id="error-precio"></span>
              </div>

              
              <div class="campo">
                <label for="stock">Stock disponible</label>
                <input type="number" id="stock" name="stock" placeholder="0" min="0" />
                <span class="error" id="error-stock"></span>
              </div>

              
              <div class="campo campo-ancho">
                <label for="imagen">Imagen (nombre de archivo en /img)</label>
                <input type="text" id="imagen" name="imagen" placeholder="Ej: tomate.jpg" />
                <span class="error" id="error-imagen"></span>
              </div>

              
              <div class="campo campo-ancho">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" name="descripcion" rows="4" placeholder="Describe el producto..."></textarea>
                <span class="error" id="error-descripcion"></span>
              </div>

              
              <div class="campo">
                <label for="origen">Origen / Productor</label>
                <input type="text" id="origen" name="origen" placeholder="Ej: Melipilla" />
                <span class="error" id="error-origen"></span>
              </div>

              
              <div class="campo campo-check">
                <input type="checkbox" id="destacado" name="destacado" />
                <label for="destacado">Mostrar en productos destacados (home)</label>
              </div>

            </div>

            
            <div class="form-acciones">
              <a href="productos.html" class="btn-secundario">Cancelar</a>
              <button type="submit" class="btn-principal" id="btn-guardar-producto">
                Guardar Producto
              </button>
            </div>

            <p id="mensaje-form-producto" style="display:none;"></p>

          </form>

        </section>

      </main>

    </div>
  </div>

  <script src="../js/productos.js"></script>
  <script src="../js/validaciones.js"></script>
  <script src="js/admin-productos.js"></script>

</body>
</html>
