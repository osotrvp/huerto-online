<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Productos - HuertoHogar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="../js/usuarios-data.js"></script>
  <script src="../js/auth.js"></script>
</head>

<body class="admin-body">
  <script>protegerVistaAdmin();</script>

  <div class="admin-layout">

    
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <img src="../img/logo.png" alt="Logo HuertoHogar" />
        <span>HuertoHogar</span>
      </div>

      <nav class="admin-menu">
        <ul>
          <li><a href="index.html">📊 Dashboard</a></li>
          <li><a href="productos.html" class="activo">🥦 Productos</a></li>
          <li><a href="usuarios.html">👤 Usuarios</a></li>
          <li><a href="../index.html">🔙 Volver al sitio</a></li>
        </ul>
      </nav>
    </aside>

    
    <div class="admin-contenido">

      <header class="admin-header">
        <h1>Gestión de Productos</h1>
        <div class="admin-usuario">
          <span id="admin-nombre-activo">👋 Hola, Admin</span>
          <button onclick="cerrarSesion()" class="btn-secundario">Cerrar sesión</button>
        </div>
      </header>

      <main class="admin-main">

        
        <section class="admin-toolbar">

          
          <div class="admin-buscador">
            <input
              type="text"
              id="buscar-producto"
              placeholder="Buscar producto por nombre..."
              onkeyup="filtrarTablaProductos()"
            />
            
          </div>

          
          <select id="filtro-categoria-admin" onchange="filtrarTablaProductos()">
            <option value="todos">Todas las categorías</option>
            <option value="verduras">Verduras</option>
            <option value="frutas">Frutas</option>
            <option value="hierbas">Hierbas</option>
            <option value="otros">Otros</option>
          </select>

          
          <a href="nuevo-producto.html" class="btn-principal">
            ➕ Nuevo Producto
          </a>

        </section>

        
        <section class="admin-tabla-contenedor">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
              </tr>
            </thead>
            
            <tbody id="tabla-productos">
              
            </tbody>
          </table>

          
          <p id="tabla-vacia" style="display:none;">
            No se encontraron productos.
          </p>
        </section>

      </main>

    </div>
  </div>

  
  <div id="modal-eliminar" class="modal" style="display:none;">
    <div class="modal-contenido">
      <h3>¿Eliminar producto?</h3>
      <p>Esta acción no se puede deshacer.</p>
      <div class="modal-acciones">
        <button onclick="cerrarModal()" class="btn-secundario">Cancelar</button>
        
        <button onclick="confirmarEliminar()" class="btn-peligro">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="../js/productos.js"></script>
  <script src="../js/validaciones.js"></script>
  <script src="js/admin-productos.js"></script>

</body>
</html>
